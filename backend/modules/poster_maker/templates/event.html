<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; width: 210mm; height: 297mm; overflow: hidden; }

  .poster {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    background: {{ bg_color }};
    position: relative;
    overflow: hidden;
  }

  .accent-bar {
    height: 12mm;
    background: {{ primary_color }};
  }

  .content {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 20mm 25mm;
    text-align: center;
  }

  .title {
    font-size: 48pt; font-weight: 900; color: {{ primary_color }};
    line-height: 1.1; margin-bottom: 8mm; text-transform: uppercase;
    letter-spacing: 1pt;
  }

  .subtitle {
    font-size: 20pt; font-weight: 400; color: #374151;
    line-height: 1.4; margin-bottom: 15mm; max-width: 80%;
  }

  .divider {
    width: 40mm; height: 2px; background: {{ primary_color }}; opacity: 0.3;
    margin-bottom: 12mm;
  }

  .details {
    display: flex; flex-direction: column; gap: 4mm;
    font-size: 16pt; color: #4B5563;
  }

  .detail-row {
    display: flex; align-items: center; justify-content: center; gap: 3mm;
  }

  .detail-icon { font-size: 18pt; }
  .detail-text { font-weight: 500; }

  .bottom-bar {
    height: 6mm;
    background: {{ primary_color }};
    opacity: 0.6;
  }

  .deco-circle {
    position: absolute; border-radius: 50%;
    background: {{ primary_color }}; opacity: 0.04;
  }
  .c1 { width: 120mm; height: 120mm; top: -30mm; right: -30mm; }
  .c2 { width: 80mm; height: 80mm; bottom: -20mm; left: -20mm; }
</style>
</head>
<body>
<div class="poster">
  <div class="accent-bar"></div>
  <div class="deco-circle c1"></div>
  <div class="deco-circle c2"></div>
  <div class="content">
    <div class="title">{{ title }}</div>
    {% if subtitle %}
    <div class="subtitle">{{ subtitle }}</div>
    {% endif %}
    <div class="divider"></div>
    <div class="details">
      <div class="detail-row">
        <span class="detail-icon">📅</span>
        <span class="detail-text">{{ date }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-icon">📍</span>
        <span class="detail-text">{{ venue }}</span>
      </div>
    </div>
  </div>
  <div class="bottom-bar"></div>
</div>
</body>
</html>
