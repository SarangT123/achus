<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
@page { size: A4; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; width: 210mm; height: 297mm; overflow: hidden; }

.poster {
  width: 100%; height: 100%;
  background: {{ bg_color }};
  display: flex; flex-direction: column;
  position: relative;
}

.accent-line {
  height: 5mm;
  background: {{ primary_color }};
}

.content {
  flex: 1;
  display: flex; flex-direction: column;
  justify-content: center;
  padding: 20mm 30mm;
}

.title {
  font-size: 44pt; font-weight: 800;
  color: {{ primary_color }};
  line-height: 1.1;
  letter-spacing: -1pt;
  margin-bottom: 6mm;
}

.subtitle {
  font-size: 18pt; font-weight: 400;
  color: #4B5563;
  line-height: 1.4;
  margin-bottom: 8mm;
}

.divider {
  width: 35mm; height: 2px;
  background: {{ primary_color }};
  opacity: 0.3;
  margin-bottom: 8mm;
}

.description {
  font-size: 12pt; font-weight: 400;
  color: #6B7280;
  line-height: 1.65;
  margin-bottom: 12mm;
  max-width: 85%;
}

.details {
  display: flex; flex-wrap: wrap; gap: 8mm;
}

.detail-item {
  display: flex; align-items: center; gap: 3mm;
}

.detail-icon {
  width: 10mm; height: 10mm;
  border-radius: 50%;
  background: {{ primary_color }};
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 10pt;
  flex-shrink: 0;
}

.detail-text {
  font-size: 13pt; font-weight: 500;
  color: #374151;
}

.accent-line-bottom {
  height: 3mm;
  background: {{ primary_color }};
  opacity: 0.4;
}
</style>
</head>
<body>
<div class="poster">
  <div class="accent-line"></div>
  <div class="content">
    <div class="title">{{ title }}</div>
    {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
    <div class="divider"></div>
    {% if description %}<div class="description">{{ description }}</div>{% endif %}
    <div class="details">
      <div class="detail-item">
        <div class="detail-icon">📅</div>
        <div class="detail-text">{{ date }}{% if time %}, {{ time }}{% endif %}</div>
      </div>
      <div class="detail-item">
        <div class="detail-icon">📍</div>
        <div class="detail-text">{{ venue }}</div>
      </div>
    </div>
  </div>
  <div class="accent-line-bottom"></div>
</div>
</body>
</html>
