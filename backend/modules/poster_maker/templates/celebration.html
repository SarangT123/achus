<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Georgia', 'Times New Roman', serif; width: 210mm; height: 297mm; overflow: hidden; }

  .poster {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, {{ bg_color }} 0%, {{ primary_color }}22 100%);
    display: flex; flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .sparkle {
    position: absolute;
    width: 4mm; height: 4mm;
    background: {{ primary_color }}; opacity: 0.15;
    border-radius: 50%;
  }
  .s1 { top: 10%; left: 8%; width: 8mm; height: 8mm; }
  .s2 { top: 25%; right: 12%; }
  .s3 { bottom: 30%; left: 15%; width: 6mm; height: 6mm; }
  .s4 { bottom: 10%; right: 20%; }
  .s5 { top: 50%; left: 5%; }
  .s6 { top: 15%; right: 40%; width: 5mm; height: 5mm; }

  .celebration-bar {
    height: 8mm;
    background: {{ primary_color }};
  }

  .content {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 15mm 25mm;
    text-align: center;
    position: relative; z-index: 1;
  }

  .emoji-row {
    font-size: 36pt; margin-bottom: 5mm;
  }

  .title {
    font-size: 48pt; font-weight: 900; color: {{ primary_color }};
    line-height: 1.1; margin-bottom: 5mm;
  }

  .subtitle {
    font-size: 18pt; font-style: italic; color: #6B7280;
    margin-bottom: 10mm;
  }

  .ornament {
    font-size: 20pt; color: {{ primary_color }}; opacity: 0.4;
    margin-bottom: 8mm;
  }

  .details {
    background: rgba(255,255,255,0.7);
    border-radius: 4mm; padding: 6mm 12mm;
    display: flex; gap: 10mm; flex-wrap: wrap; justify-content: center;
  }

  .detail-item { text-align: center; }
  .detail-icon { font-size: 16pt; }
  .detail-text { font-size: 14pt; color: #374151; font-weight: 500; margin-top: 1mm; }

  .celebration-bar-bottom {
    height: 8mm;
    background: {{ primary_color }};
  }
</style>
</head>
<body>
<div class="poster">
  <div class="celebration-bar"></div>
  <div class="sparkle s1"></div><div class="sparkle s2"></div>
  <div class="sparkle s3"></div><div class="sparkle s4"></div>
  <div class="sparkle s5"></div><div class="sparkle s6"></div>
  <div class="content">
    <div class="emoji-row">🎉 ✨ 🎉</div>
    <div class="title">{{ title }}</div>
    {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
    <div class="ornament">✦ ✦ ✦</div>
    <div class="details">
      <div class="detail-item"><div class="detail-icon">📅</div><div class="detail-text">{{ date }}</div></div>
      <div class="detail-item"><div class="detail-icon">📍</div><div class="detail-text">{{ venue }}</div></div>
    </div>
  </div>
  <div class="celebration-bar-bottom"></div>
</div>
</body>
</html>
