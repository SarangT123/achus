<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; width: 210mm; height: 297mm; }

  .poster {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    background: {{ bg_color }};
  }

  .header-band {
    background: {{ primary_color }};
    padding: 20mm 25mm 15mm;
  }

  .header-band .title {
    font-size: 44pt; font-weight: 900; color: #fff;
    line-height: 1.15; text-transform: uppercase;
  }

  .header-band .subtitle {
    font-size: 18pt; color: rgba(255,255,255,0.85);
    margin-top: 5mm; font-weight: 400;
  }

  .body-section {
    flex: 1; padding: 15mm 25mm;
    display: flex; flex-direction: column;
    justify-content: center;
  }

  .info-card {
    background: #fff; border-radius: 4mm;
    padding: 10mm 15mm;
    box-shadow: 0 2mm 6mm rgba(0,0,0,0.06);
    border-left: 4mm solid {{ primary_color }};
  }

  .info-row {
    display: flex; align-items: center; gap: 4mm;
    padding: 3mm 0;
    font-size: 16pt; color: #374151;
  }

  .info-row + .info-row { border-top: 1px solid #F3F4F6; }

  .info-icon { font-size: 20pt; width: 10mm; text-align: center; }
  .info-label { font-weight: 600; color: {{ primary_color }}; min-width: 25mm; }
</style>
</head>
<body>
<div class="poster">
  <div class="header-band">
    <div class="title">{{ title }}</div>
    {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
  </div>
  <div class="body-section">
    <div class="info-card">
      <div class="info-row"><span class="info-icon">📅</span><span class="info-label">Date</span><span>{{ date }}</span></div>
      <div class="info-row"><span class="info-icon">📍</span><span class="info-label">Venue</span><span>{{ venue }}</span></div>
    </div>
  </div>
</div>
</body>
</html>
