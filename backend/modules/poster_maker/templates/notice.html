<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; width: 210mm; height: 297mm; }

  .poster {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    background: {{ bg_color }};
    padding: 15mm 20mm;
  }

  .notice-label {
    font-size: 14pt; font-weight: 700; color: {{ primary_color }};
    letter-spacing: 4pt; text-transform: uppercase; margin-bottom: 8mm;
  }

  .title {
    font-size: 40pt; font-weight: 900; color: #111827;
    line-height: 1.15; margin-bottom: 5mm;
  }

  .divider {
    width: 30mm; height: 3px; background: {{ primary_color }};
    margin-bottom: 8mm;
  }

  .subtitle {
    font-size: 16pt; color: #4B5563; line-height: 1.5;
    margin-bottom: 12mm; max-width: 90%;
  }

  .details {
    margin-top: auto;
    display: flex; gap: 10mm; flex-wrap: wrap;
    padding-top: 10mm; border-top: 1px solid rgba(0,0,0,0.08);
  }

  .detail-item {
    display: flex; flex-direction: column; gap: 1mm;
  }

  .detail-label { font-size: 10pt; font-weight: 700; color: {{ primary_color }}; text-transform: uppercase; letter-spacing: 1pt; }
  .detail-value { font-size: 16pt; color: #1F2937; font-weight: 500; }
</style>
</head>
<body>
<div class="poster">
  <div class="notice-label">Notice</div>
  <div class="title">{{ title }}</div>
  <div class="divider"></div>
  {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
  <div class="details">
    <div class="detail-item"><span class="detail-label">Date</span><span class="detail-value">{{ date }}</span></div>
    <div class="detail-item"><span class="detail-label">Venue</span><span class="detail-value">{{ venue }}</span></div>
  </div>
</div>
</body>
</html>
